<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="google-site-verification" content="246QM4Xki0jvdh3ANoDKXe-UOPQ23He8W83KY4P5ttA" />
<link rel="icon" href="{{ site.baseurl }}/{{site.favicon}}">

<!-- <title>{{ page.title }} | {{site.title}}</title> -->

{% seo %}

<!-- Fontawesome -->
<link type="text/css" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" rel="stylesheet">

<!-- Nucleo icons -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/nucleo.css" type="text/css">

<!-- Prism -->
<link type="text/css" href="{{ site.baseurl }}/assets/css/prism.css" rel="stylesheet">

<!-- Front CSS -->
<link type="text/css" href="{{ site.baseurl }}/assets/css/front.css" rel="stylesheet">

<!-- custom CSS - Remove this if you don't use it or choose to customize the stylesheet with sass-->
<!--<link href="{{ site.baseurl }}/assets/css/custom.css" rel="stylesheet"> -->
<!-- custom CSS end-->

{% if jekyll.environment == "production" %}
<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{site.ganalytics}}"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', '{{site.ganalytics}}');
</script>
{% endif %}
</head>

{% capture layout %}{% if page.layout %}layout-{{ page.layout }}{% endif %}{% endcapture %}
<body class="{{ layout }}">

<!-- Menu Navigation
================================================== -->
<header class="header-global">
{% include main_nav.html %}
</header>


<!-- Container
================================================== -->
<main>
      {{ content }}
</main>

<!-- Footer
================================================== -->
{% include footer.html %}

</body>

</html>
